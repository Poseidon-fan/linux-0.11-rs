repos:
  - repo: local
    hooks:
      - id: kernel-fmt
        name: kernel-fmt
        language: system
        entry: bash -c 'cd kernel && cargo fmt'
        pass_filenames: false
        files: ^kernel/
      - id: kernel-clippy
        name: kernel-clippy
        language: system
        entry: bash -c 'cd kernel && cargo clippy -- -D warnings'
        pass_filenames: false
        files: ^(kernel|user_lib)/
      - id: user-lib-fmt
        name: user-lib-fmt
        language: system
        entry: bash -c 'cd user_lib && cargo fmt'
        pass_filenames: false
        files: ^user_lib/
      - id: user-lib-clippy
        name: user-lib-clippy
        language: system
        entry: bash -c 'cd user_lib && cargo clippy -- -D warnings'
        pass_filenames: false
        files: ^user_lib/
      - id: user-program-fmt
        name: user-program-fmt
        language: system
        entry: bash -c 'cd user_program && cargo fmt'
        pass_filenames: false
        files: ^user_program/
      - id: user-program-clippy
        name: user-program-clippy
        language: system
        entry: bash -c 'cd user_program && cargo clippy -- -D warnings'
        pass_filenames: false
        files: ^user_program/
      - id: miniximg-fmt
        name: miniximg-fmt
        language: system
        entry: bash -c 'cd miniximg && cargo fmt'
        pass_filenames: false
        files: ^miniximg/
      - id: miniximg-clippy
        name: miniximg-clippy
        language: system
        entry: bash -c 'cd miniximg && cargo clippy -- -D warnings'
        pass_filenames: false
        files: ^miniximg/
      - id: mbrkit-fmt
        name: mbrkit-fmt
        language: system
        entry: bash -c 'cd mbrkit && cargo fmt'
        pass_filenames: false
        files: ^mbrkit/
      - id: mbrkit-clippy
        name: mbrkit-clippy
        language: system
        entry: bash -c 'cd mbrkit && cargo clippy -- -D warnings'
        pass_filenames: false
        files: ^mbrkit/
  - repo: https://github.com/crate-ci/typos
    rev: v1.39.0
    hooks:
      - id: typos
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: debug-statements
      - id: mixed-line-ending
        args: ["--fix=lf"]
